<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Daymori · 专注时光</title>
  <link rel="manifest" href="./manifest.json"/>
  <meta name="theme-color" content="#e94560"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
      color:#fff;
      font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
      transition:background .4s,color .4s;
      overflow-x:hidden;
    }

    body.dark-mode{
      background:linear-gradient(135deg,#0d0d0d 0%,#1a1a1a 50%,#2a2a2a 100%);
      color:#e0e0e0;
    }

    /* ── Sidebar ── */
    .sidebar{
      position:fixed;
      top:0;left:0;
      width:280px;height:100vh;
      background:rgba(20,20,40,.95);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border-right:1px solid rgba(255,255,255,.08);
      transform:translateX(-100%);
      transition:transform .3s cubic-bezier(.4,0,.2,1);
      z-index:1000;
      display:flex;
      flex-direction:column;
    }
    body.dark-mode .sidebar{
      background:rgba(10,10,10,.96);
      border-right-color:rgba(255,255,255,.05);
    }
    .sidebar.show{transform:translateX(0);}
    .sidebar-content{
      flex:1;
      overflow-y:auto;
      padding:1rem 1.25rem 2rem;
    }

    @media(max-width:760px){
      .sidebar{width:85vw;}
    }

    .sidebar-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:.75rem 1.25rem;
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .sidebar-header h2{
      font-size:1.1rem;
      opacity:.8;
      font-weight:600;
    }
    .close-btn{
      background:none;
      border:none;
      color:inherit;
      font-size:1.4rem;
      cursor:pointer;
      opacity:.6;
      padding:.25rem .5rem;
      border-radius:.5rem;
      transition:opacity .15s,background .15s;
      line-height:1;
    }
    .close-btn:hover{opacity:1;background:rgba(255,255,255,.1);}

    /* ── Overlay ── */
    .overlay{
      position:fixed;inset:0;
      background:rgba(0,0,0,.5);
      z-index:999;
      opacity:0;pointer-events:none;
      transition:opacity .3s;
    }
    .overlay.show{opacity:1;pointer-events:auto;}

    /* ── Hamburger button ── */
    .menu-btn{
      position:fixed;
      top:1rem;left:1rem;
      z-index:800;
      background:rgba(255,255,255,.1);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.15);
      color:#fff;
      font-size:1.3rem;
      width:2.5rem;height:2.5rem;
      border-radius:.75rem;
      cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:background .15s,transform .15s;
    }
    .menu-btn:hover{background:rgba(255,255,255,.2);transform:scale(1.05);}

    /* ── Main content ── */
    .main{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      padding:5rem 1.25rem 3rem;
      max-width:560px;
      margin:0 auto;
    }

    /* ── Hero ── */
    .hero{text-align:center;margin-bottom:2.5rem;}
    .hero h1{
      font-size:clamp(1.75rem,5vw,2.5rem);
      font-weight:700;
      background:linear-gradient(135deg,#e94560,#a855f7);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      margin-bottom:.5rem;
    }
    .hero p{font-size:.95rem;opacity:.55;}

    /* ── Session tabs ── */
    .session-tabs{
      display:flex;
      gap:.5rem;
      margin-bottom:2rem;
      background:rgba(255,255,255,.06);
      border-radius:1rem;
      padding:.3rem;
    }
    .tab{
      flex:1;
      padding:.5rem 1rem;
      border:none;
      border-radius:.75rem;
      background:transparent;
      color:rgba(255,255,255,.55);
      font-size:.85rem;
      cursor:pointer;
      transition:background .2s,color .2s;
    }
    .tab.active{
      background:rgba(233,69,96,.85);
      color:#fff;
      font-weight:600;
    }

    /* ── Timer ── */
    .timer-wrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      margin-bottom:2rem;
    }
    .timer-ring{
      position:relative;
      width:220px;height:220px;
      margin-bottom:1.5rem;
    }
    .timer-ring svg{transform:rotate(-90deg);}
    .timer-ring circle{
      fill:none;
      stroke-width:6;
      stroke-linecap:round;
    }
    .ring-bg{stroke:rgba(255,255,255,.08);}
    .ring-fg{
      stroke:#e94560;
      stroke-dasharray:628;
      stroke-dashoffset:0;
      transition:stroke-dashoffset 1s linear;
    }
    .timer-display{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    }
    .timer-text{
      font-size:3rem;
      font-weight:700;
      letter-spacing:.05em;
      line-height:1;
    }
    .timer-label{
      font-size:.8rem;
      opacity:.5;
      margin-top:.3rem;
    }
    .timer-controls{display:flex;gap:1rem;}
    .ctrl-btn{
      padding:.65rem 1.75rem;
      border:none;
      border-radius:2rem;
      font-size:.95rem;
      cursor:pointer;
      transition:transform .15s,opacity .15s;
      font-weight:600;
    }
    .ctrl-btn.primary{background:linear-gradient(135deg,#e94560,#a855f7);color:#fff;}
    .ctrl-btn.secondary{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.15);}
    .ctrl-btn:hover{transform:scale(1.05);opacity:.9;}
    .ctrl-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

    /* ── Toast ── */
    .toast{
      position:fixed;
      bottom:2rem;
      left:50%;
      transform:translateX(-50%) translateY(4rem);
      background:rgba(30,30,50,.95);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,.1);
      color:#fff;
      padding:.75rem 1.5rem;
      border-radius:1rem;
      font-size:.9rem;
      z-index:2000;
      opacity:0;
      pointer-events:none;
      transition:opacity .3s,transform .3s;
      max-width:90vw;
      text-align:center;
      box-shadow:0 8px 32px rgba(0,0,0,.4);
    }
    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    /* ── Cards ── */
    .card{
      width:100%;
      background:rgba(255,255,255,.06);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,.08);
      border-radius:1.25rem;
      padding:1.25rem;
      margin-bottom:1.25rem;
    }
    .card h3{
      font-size:.9rem;
      opacity:.6;
      margin-bottom:1rem;
      display:flex;
      align-items:center;
      gap:.5rem;
    }
    .add-row{display:flex;gap:.5rem;}
    .add-row input{
      flex:1;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.1);
      border-radius:.75rem;
      padding:.55rem .85rem;
      color:#fff;
      font-size:.9rem;
      outline:none;
      transition:border-color .15s;
    }
    .add-row input:focus{border-color:rgba(233,69,96,.6);}
    .add-row input::placeholder{color:rgba(255,255,255,.3);}
    .add-btn{
      padding:.55rem 1rem;
      background:rgba(233,69,96,.8);
      border:none;
      border-radius:.75rem;
      color:#fff;
      font-size:1.1rem;
      cursor:pointer;
      transition:background .15s,transform .15s;
      line-height:1;
    }
    .add-btn:hover{background:rgba(233,69,96,1);transform:scale(1.05);}

    .list{list-style:none;margin-top:.75rem;display:flex;flex-direction:column;gap:.5rem;}
    .list li{
      display:flex;
      align-items:center;
      gap:.5rem;
      padding:.5rem .75rem;
      background:rgba(255,255,255,.05);
      border-radius:.75rem;
      font-size:.9rem;
      animation:fadeIn .3s ease;
    }
    .list li.removing{animation:fadeOut .3s ease forwards;}
    .list li span{flex:1;}
    .list li .del-btn{
      background:none;
      border:none;
      color:rgba(255,255,255,.4);
      cursor:pointer;
      font-size:1rem;
      padding:.1rem .3rem;
      border-radius:.4rem;
      transition:color .15s,background .15s;
    }
    .list li .del-btn:hover{color:#e94560;background:rgba(233,69,96,.1);}
    .list li input[type=checkbox]{
      accent-color:#e94560;
      width:1rem;height:1rem;
      cursor:pointer;
      flex-shrink:0;
    }
    .list li.done span{text-decoration:line-through;opacity:.45;}

    @keyframes fadeIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:none;}}
    @keyframes fadeOut{from{opacity:1;transform:none;}to{opacity:0;transform:translateX(12px);}}

    /* ── Sidebar inner ── */
    .sidebar-section{margin-bottom:1.5rem;}
    .sidebar-section h3{font-size:.8rem;opacity:.45;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.75rem;}
    .sidebar-item{
      display:flex;align-items:center;justify-content:space-between;
      padding:.65rem .75rem;
      border-radius:.75rem;
      cursor:pointer;
      font-size:.9rem;
      transition:background .15s;
      color:rgba(255,255,255,.8);
      text-decoration:none;
    }
    .sidebar-item:hover{background:rgba(255,255,255,.08);}
    .sidebar-item .icon{font-size:1.1rem;margin-right:.6rem;}
    .sidebar-item-left{display:flex;align-items:center;}
    .toggle-wrap{
      width:2.5rem;height:1.375rem;
      background:rgba(255,255,255,.15);
      border-radius:1rem;
      position:relative;
      cursor:pointer;
      transition:background .2s;
    }
    .toggle-wrap.on{background:#e94560;}
    .toggle-knob{
      position:absolute;
      top:.1875rem;left:.1875rem;
      width:1rem;height:1rem;
      background:#fff;
      border-radius:50%;
      transition:transform .2s;
    }
    .toggle-wrap.on .toggle-knob{transform:translateX(1.125rem);}

    .duration-row{
      display:flex;align-items:center;gap:.5rem;
      padding:.5rem .75rem;
      font-size:.9rem;
      color:rgba(255,255,255,.7);
    }
    .duration-row label{flex:1;}
    .duration-row input[type=number]{
      width:3.5rem;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      border-radius:.5rem;
      color:#fff;
      padding:.3rem .5rem;
      font-size:.9rem;
      text-align:center;
      outline:none;
    }
    .duration-row input[type=number]:focus{border-color:rgba(233,69,96,.5);}

    /* ── Install banner ── */
    #installBanner{
      position:fixed;bottom:1.5rem;right:1.5rem;
      background:rgba(30,30,60,.95);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,.1);
      border-radius:1rem;
      padding:1rem 1.25rem;
      color:#fff;
      font-size:.875rem;
      display:none;
      flex-direction:column;
      gap:.75rem;
      max-width:300px;
      z-index:1500;
      box-shadow:0 8px 32px rgba(0,0,0,.4);
    }
    #installBanner p{opacity:.75;line-height:1.4;}
    #installBanner .btn-row{display:flex;gap:.5rem;}
    #installBanner button{
      flex:1;padding:.45rem;border:none;border-radius:.6rem;
      cursor:pointer;font-size:.85rem;transition:opacity .15s;
    }
    #installBanner .install-yes{background:#e94560;color:#fff;}
    #installBanner .install-no{background:rgba(255,255,255,.1);color:#fff;}
    #installBanner button:hover{opacity:.85;}
  </style>
</head>
<body>

  <!-- Hamburger button (always visible, opens sidebar) -->
  <button class="menu-btn" id="menuBtn" aria-label="打开设置菜单">☰</button>

  <!-- Sidebar overlay -->
  <div class="overlay" id="overlay"></div>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar" aria-label="设置面板">
    <div class="sidebar-header">
      <h2>⚙️ 设置</h2>
      <button class="close-btn" id="closeBtn" aria-label="关闭侧边栏">✕</button>
    </div>
    <div class="sidebar-content">
      <!-- Duration settings -->
      <div class="sidebar-section">
        <h3>⏱ 时长设置（分钟）</h3>
        <div class="duration-row">
          <label>专注</label>
          <input type="number" id="focusDur" min="1" max="120" value="25"/>
        </div>
        <div class="duration-row">
          <label>短休息</label>
          <input type="number" id="shortBreakDur" min="1" max="60" value="5"/>
        </div>
        <div class="duration-row">
          <label>长休息</label>
          <input type="number" id="longBreakDur" min="1" max="60" value="15"/>
        </div>
        <div class="duration-row">
          <label>30分钟休息</label>
          <input type="number" id="restDur30" min="1" max="120" value="30"/>
        </div>
      </div>

      <!-- Options -->
      <div class="sidebar-section">
        <h3>🔧 选项</h3>
        <div class="sidebar-item" id="darkModeToggle">
          <div class="sidebar-item-left"><span class="icon">🌙</span>深色模式</div>
          <div class="toggle-wrap" id="darkToggleWrap"><div class="toggle-knob"></div></div>
        </div>
        <div class="sidebar-item" id="audioToggle">
          <div class="sidebar-item-left"><span class="icon">🎵</span>背景音乐</div>
          <div class="toggle-wrap" id="audioToggleWrap"><div class="toggle-knob"></div></div>
        </div>
        <div class="sidebar-item" id="autoNextToggle">
          <div class="sidebar-item-left"><span class="icon">⏭</span>自动切换阶段</div>
          <div class="toggle-wrap" id="autoNextToggleWrap"><div class="toggle-knob"></div></div>
        </div>
      </div>

      <!-- Navigation -->
      <div class="sidebar-section">
        <h3>🌙 页面</h3>
        <a class="sidebar-item" href="./dream.html">
          <div class="sidebar-item-left"><span class="icon">✨</span>梦境时光</div>
          <span style="opacity:.35;font-size:.8rem;">→</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main class="main">
    <div class="hero">
      <h1>Daymori</h1>
      <p id="dateDisplay">专注时光，美好每天</p>
    </div>

    <!-- Session tabs -->
    <div class="session-tabs" role="tablist">
      <button class="tab active" data-session="0" role="tab">专注</button>
      <button class="tab" data-session="1" role="tab">短休息</button>
      <button class="tab" data-session="2" role="tab">长休息</button>
      <button class="tab" data-session="3" role="tab">30分钟休息</button>
    </div>

    <!-- Timer -->
    <div class="timer-wrap">
      <div class="timer-ring">
        <svg width="220" height="220" viewBox="0 0 220 220">
          <circle class="ring-bg" cx="110" cy="110" r="100"/>
          <circle class="ring-fg" id="ringFg" cx="110" cy="110" r="100"/>
        </svg>
        <div class="timer-display">
          <div class="timer-text" id="timerText">25:00</div>
          <div class="timer-label" id="timerLabel">专注</div>
        </div>
      </div>
      <div class="timer-controls">
        <button class="ctrl-btn primary" id="startBtn">开始</button>
        <button class="ctrl-btn secondary" id="resetBtn">重置</button>
        <button class="ctrl-btn secondary" id="skipBtn">跳过</button>
      </div>
    </div>

    <!-- Tasks card -->
    <div class="card">
      <h3>📋 今日任务</h3>
      <div class="add-row">
        <input type="text" id="taskInput" placeholder="添加任务…" maxlength="80"/>
        <button class="add-btn" id="addTaskBtn">+</button>
      </div>
      <ul class="list" id="taskList"></ul>
    </div>

    <!-- Wishes card -->
    <div class="card">
      <h3>💫 心愿清单</h3>
      <div class="add-row">
        <input type="text" id="wishInput" placeholder="写下心愿…" maxlength="80"/>
        <button class="add-btn" id="addWishBtn">+</button>
      </div>
      <ul class="list" id="wishList"></ul>
    </div>
  </main>

  <!-- Toast notification -->
  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <!-- PWA install banner -->
  <div id="installBanner">
    <p>📲 将 Daymori 添加到主屏幕，随时专注！</p>
    <div class="btn-row">
      <button class="install-yes" id="installYes">安装</button>
      <button class="install-no" id="installNo">以后再说</button>
    </div>
  </div>

  <script>
    // ── Constants ──────────────────────────────────────────────────────────
    const GOOD_JOB_AUDIO_SRC = './goodjob.m4a';
    const BG_AUDIO_SRC = './Andrew.m4a';

    const SESSIONS = [
      { label: '专注',      key: 'focusDur',      defaultMin: 25 },
      { label: '短休息',    key: 'shortBreakDur', defaultMin: 5 },
      { label: '长休息',    key: 'longBreakDur',  defaultMin: 15 },
      { label: '30分钟休息', key: 'restDur30',     defaultMin: 30 }
    ];

    // ── State ──────────────────────────────────────────────────────────────
    let currentSession = 0;
    let totalSecs = SESSIONS[0].defaultMin * 60;
    let remainSecs = totalSecs;
    let running = false;
    let tickInterval = null;
    let startTimestamp = null;
    let pausedRemain = null;
    let bgAudio = null;
    let goodJobAudio = null;

    // ── Settings (persisted) ──────────────────────────────────────────────
    function loadSettings() {
      try { return JSON.parse(localStorage.getItem('daymori-settings') || '{}'); }
      catch { return {}; }
    }
    function saveSettings(s) {
      try { localStorage.setItem('daymori-settings', JSON.stringify(s)); }
      catch {}
    }
    let settings = loadSettings();

    function getSetting(key, def) {
      return key in settings ? settings[key] : def;
    }
    function setSetting(key, val) {
      settings[key] = val;
      saveSettings(settings);
    }

    // ── Duration helpers ──────────────────────────────────────────────────
    function getDurMin(idx) {
      const key = SESSIONS[idx].key;
      const stored = parseInt(settings[key], 10);
      return (!isNaN(stored) && stored > 0) ? stored : SESSIONS[idx].defaultMin;
    }

    // ── Toast notification ─────────────────────────────────────────────────
    let toastTimer = null;
    function showToast(msg, duration = 3000) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), duration);
    }

    // ── Ring progress ─────────────────────────────────────────────────────
    const RING_CIRCUMFERENCE = 2 * Math.PI * 100; // r=100
    function updateRing(remain, total) {
      const fg = document.getElementById('ringFg');
      const progress = total > 0 ? remain / total : 1;
      fg.style.strokeDashoffset = RING_CIRCUMFERENCE * (1 - progress);
    }

    // ── Timer display ─────────────────────────────────────────────────────
    function formatTime(secs) {
      const m = String(Math.floor(secs / 60)).padStart(2, '0');
      const s = String(secs % 60).padStart(2, '0');
      return `${m}:${s}`;
    }
    function updateDisplay() {
      document.getElementById('timerText').textContent = formatTime(remainSecs);
      document.getElementById('timerLabel').textContent = SESSIONS[currentSession].label;
      updateRing(remainSecs, totalSecs);
    }

    // ── Session switching ──────────────────────────────────────────────────
    function switchSession(idx, autoStarted = false) {
      currentSession = idx;
      totalSecs = getDurMin(idx) * 60;
      remainSecs = totalSecs;
      running = false;
      clearInterval(tickInterval);
      startTimestamp = null;
      pausedRemain = null;

      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', i === idx);
      });
      document.getElementById('startBtn').textContent = '开始';
      updateDisplay();
    }

    // ── Complete a session ────────────────────────────────────────────────
    function completeSession() {
      const c = SESSIONS[currentSession];
      const nextIdx = (currentSession + 1) % SESSIONS.length;
      const n = SESSIONS[nextIdx];

      // Play good job sound
      try {
        if (!goodJobAudio) goodJobAudio = new Audio(GOOD_JOB_AUDIO_SRC);
        goodJobAudio.currentTime = 0;
        goodJobAudio.play().catch(() => {});
      } catch {}

      // Show toast instead of alert (non-blocking)
      showToast(`${c.label}结束了，已为你切换到${n.label}。`, 4000);

      if (getSetting('autoNext', false)) {
        switchSession(nextIdx);
        startTimer();
      } else {
        switchSession(nextIdx);
      }
    }

    // ── Timer core ────────────────────────────────────────────────────────
    function tick() {
      if (!running || startTimestamp === null) return;
      const elapsed = Math.floor((Date.now() - startTimestamp) / 1000);
      const base = pausedRemain !== null ? pausedRemain : totalSecs;
      remainSecs = Math.max(0, base - elapsed);
      updateDisplay();
      if (remainSecs === 0) {
        running = false;
        clearInterval(tickInterval);
        completeSession();
      }
    }

    function startTimer() {
      if (running) return;
      running = true;
      startTimestamp = Date.now();
      pausedRemain = remainSecs < totalSecs ? remainSecs : null;
      if (pausedRemain !== null) {
        startTimestamp = Date.now();
      }
      document.getElementById('startBtn').textContent = '暂停';
      tickInterval = setInterval(tick, 500);
      // Start background music if enabled
      if (getSetting('bgAudio', false) && bgAudio && bgAudio.paused) {
        bgAudio.play().catch(() => {});
      }
    }

    function pauseTimer() {
      if (!running) return;
      running = false;
      pausedRemain = remainSecs;
      startTimestamp = null;
      clearInterval(tickInterval);
      document.getElementById('startBtn').textContent = '继续';
    }

    function resetTimer() {
      running = false;
      clearInterval(tickInterval);
      startTimestamp = null;
      pausedRemain = null;
      remainSecs = totalSecs;
      document.getElementById('startBtn').textContent = '开始';
      updateDisplay();
    }

    // ── Timer controls ────────────────────────────────────────────────────
    document.getElementById('startBtn').addEventListener('click', () => {
      if (running) pauseTimer(); else startTimer();
    });
    document.getElementById('resetBtn').addEventListener('click', resetTimer);
    document.getElementById('skipBtn').addEventListener('click', () => {
      running = false;
      clearInterval(tickInterval);
      completeSession();
    });

    // ── Session tabs ──────────────────────────────────────────────────────
    document.querySelectorAll('.tab').forEach((btn, idx) => {
      btn.addEventListener('click', () => switchSession(idx));
    });

    // ── Sidebar open/close ────────────────────────────────────────────────
    function openSidebar() {
      document.getElementById('sidebar').classList.add('show');
      document.getElementById('overlay').classList.add('show');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('show');
      document.getElementById('overlay').classList.remove('show');
    }

    document.getElementById('menuBtn').addEventListener('click', openSidebar);
    document.getElementById('closeBtn').addEventListener('click', closeSidebar);
    document.getElementById('overlay').addEventListener('click', closeSidebar);

    // Touch-swipe to open sidebar from left edge
    let touchStartX = 0;
    document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    document.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (touchStartX < 24 && dx > 60) openSidebar();
    }, { passive: true });

    // ── Dark mode ─────────────────────────────────────────────────────────
    function applyDarkMode(on) {
      document.body.classList.toggle('dark-mode', on);
      document.getElementById('darkToggleWrap').classList.toggle('on', on);
    }
    document.getElementById('darkModeToggle').addEventListener('click', () => {
      const next = !getSetting('darkMode', false);
      setSetting('darkMode', next);
      applyDarkMode(next);
    });

    // ── Audio toggle ──────────────────────────────────────────────────────
    function applyAudioSetting(on) {
      document.getElementById('audioToggleWrap').classList.toggle('on', on);
      if (!bgAudio) {
        bgAudio = new Audio(BG_AUDIO_SRC);
        bgAudio.loop = true;
      }
      if (on && running) bgAudio.play().catch(() => {});
      if (!on) bgAudio.pause();
    }
    document.getElementById('audioToggle').addEventListener('click', () => {
      const next = !getSetting('bgAudio', false);
      setSetting('bgAudio', next);
      applyAudioSetting(next);
    });

    // ── Auto-next toggle ──────────────────────────────────────────────────
    function applyAutoNext(on) {
      document.getElementById('autoNextToggleWrap').classList.toggle('on', on);
    }
    document.getElementById('autoNextToggle').addEventListener('click', () => {
      const next = !getSetting('autoNext', false);
      setSetting('autoNext', next);
      applyAutoNext(next);
    });

    // ── Duration inputs ───────────────────────────────────────────────────
    ['focusDur', 'shortBreakDur', 'longBreakDur', 'restDur30'].forEach(id => {
      const inp = document.getElementById(id);
      const key = id;
      inp.value = getDurMin(SESSIONS.findIndex(s => s.key === key));
      inp.addEventListener('change', () => {
        const val = Math.max(1, parseInt(inp.value, 10) || 1);
        inp.value = val;
        setSetting(key, val);
        if (SESSIONS[currentSession].key === key && !running) {
          totalSecs = val * 60;
          remainSecs = totalSecs;
          updateDisplay();
        }
      });
    });

    // ── Tasks ─────────────────────────────────────────────────────────────
    function loadList(key) {
      try { return JSON.parse(localStorage.getItem(key) || '[]'); }
      catch { return []; }
    }
    function saveList(key, arr) {
      try { localStorage.setItem(key, JSON.stringify(arr)); }
      catch {}
    }

    function renderList(listId, key) {
      const ul = document.getElementById(listId);
      const items = loadList(key);
      ul.innerHTML = '';
      items.forEach((item, idx) => {
        const li = document.createElement('li');
        if (item.done) li.classList.add('done');
        if (listId === 'taskList') {
          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = !!item.done;
          cb.addEventListener('change', () => {
            const arr = loadList(key);
            arr[idx].done = cb.checked;
            saveList(key, arr);
            renderList(listId, key);
          });
          li.appendChild(cb);
        }
        const span = document.createElement('span');
        span.textContent = item.text;
        li.appendChild(span);
        const del = document.createElement('button');
        del.className = 'del-btn';
        del.textContent = '✕';
        del.addEventListener('click', () => {
          li.classList.add('removing');
          setTimeout(() => {
            const arr = loadList(key);
            arr.splice(idx, 1);
            saveList(key, arr);
            renderList(listId, key);
          }, 280);
        });
        li.appendChild(del);
        ul.appendChild(li);
      });
    }

    function addItem(inputId, listId, key) {
      const inp = document.getElementById(inputId);
      const text = inp.value.trim();
      if (!text) return;
      const arr = loadList(key);
      arr.push({ text, done: false });
      saveList(key, arr);
      inp.value = '';
      renderList(listId, key);
    }

    document.getElementById('addTaskBtn').addEventListener('click', () => addItem('taskInput', 'taskList', 'daymori-tasks'));
    document.getElementById('taskInput').addEventListener('keydown', e => { if (e.key === 'Enter') addItem('taskInput', 'taskList', 'daymori-tasks'); });
    document.getElementById('addWishBtn').addEventListener('click', () => addItem('wishInput', 'wishList', 'daymori-wishes'));
    document.getElementById('wishInput').addEventListener('keydown', e => { if (e.key === 'Enter') addItem('wishInput', 'wishList', 'daymori-wishes'); });

    // ── Date display ──────────────────────────────────────────────────────
    function updateDate() {
      const now = new Date();
      const opts = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
      document.getElementById('dateDisplay').textContent = now.toLocaleDateString('zh-CN', opts);
    }

    // ── PWA install banner ────────────────────────────────────────────────
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      const banner = document.getElementById('installBanner');
      banner.style.display = 'flex';
    });
    document.getElementById('installYes').addEventListener('click', () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
      }
      document.getElementById('installBanner').style.display = 'none';
    });
    document.getElementById('installNo').addEventListener('click', () => {
      document.getElementById('installBanner').style.display = 'none';
    });

    // ── Service Worker ────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js').catch(() => {});
    }

    // ── Init ──────────────────────────────────────────────────────────────
    (function init() {
      applyDarkMode(getSetting('darkMode', false));
      applyAudioSetting(getSetting('bgAudio', false));
      applyAutoNext(getSetting('autoNext', false));

      // Restore duration inputs
      ['focusDur', 'shortBreakDur', 'longBreakDur', 'restDur30'].forEach(id => {
        const idx = SESSIONS.findIndex(s => s.key === id);
        document.getElementById(id).value = getDurMin(idx);
      });

      switchSession(0);
      updateDate();
      renderList('taskList', 'daymori-tasks');
      renderList('wishList', 'daymori-wishes');
    })();
  </script>
</body>
</html>
