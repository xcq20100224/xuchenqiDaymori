<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream</title>
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./favicon.svg">
<meta name="theme-color" content="#0c2346">
<style>
:root{--bg1:#07182f;--bg2:#0c2346;--bg3:#133767;--text:#edf5ff;--muted:rgba(221,234,255,.72);--line:rgba(155,195,255,.14);--glow:rgba(130,182,255,.22);--accent:#9ccbff}*{box-sizing:border-box}html,body{margin:0}body{min-height:100vh;font-family:"SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(113,170,255,.18),transparent 30%),radial-gradient(circle at 80% 16%,rgba(122,153,255,.16),transparent 24%),radial-gradient(circle at center bottom,rgba(129,189,255,.14),transparent 34%),linear-gradient(180deg,var(--bg1),var(--bg2) 48%,var(--bg3));overflow-x:hidden;transition:background 1.8s ease}body.playing{animation:breathe 8s ease-in-out infinite}body::before,body::after{content:"";position:fixed;border-radius:50%;pointer-events:none;filter:blur(18px);opacity:.75}body::before{width:260px;height:260px;top:8vh;right:-60px;background:radial-gradient(circle,rgba(144,196,255,.26),transparent 70%)}body::after{width:320px;height:320px;left:-120px;bottom:-60px;background:radial-gradient(circle,rgba(105,146,255,.22),transparent 70%)}.stars,.stars::before,.stars::after{position:fixed;inset:0;pointer-events:none;content:""}.stars{z-index:0;background-image:radial-gradient(circle at 12% 18%,rgba(255,255,255,.9) 0 1px,transparent 1.8px),radial-gradient(circle at 24% 62%,rgba(215,232,255,.75) 0 1px,transparent 2px),radial-gradient(circle at 42% 22%,rgba(255,255,255,.86) 0 1.1px,transparent 2px),radial-gradient(circle at 58% 72%,rgba(205,228,255,.78) 0 1px,transparent 2px),radial-gradient(circle at 74% 16%,rgba(255,255,255,.92) 0 1px,transparent 2px),radial-gradient(circle at 88% 54%,rgba(222,236,255,.82) 0 1.1px,transparent 2px);opacity:.64}.stars::before{background-image:radial-gradient(circle at 8% 78%,rgba(255,255,255,.72) 0 1px,transparent 2px),radial-gradient(circle at 36% 86%,rgba(205,228,255,.72) 0 1.2px,transparent 2px),radial-gradient(circle at 51% 12%,rgba(255,255,255,.76) 0 1px,transparent 2px),radial-gradient(circle at 79% 82%,rgba(226,238,255,.7) 0 1px,transparent 2px),radial-gradient(circle at 92% 28%,rgba(255,255,255,.76) 0 1px,transparent 2px);opacity:.48;animation:drift 24s linear infinite}.stars::after{background-image:radial-gradient(circle at 18% 38%,rgba(255,255,255,.78) 0 1px,transparent 2px),radial-gradient(circle at 47% 48%,rgba(210,231,255,.7) 0 1px,transparent 2px),radial-gradient(circle at 68% 88%,rgba(255,255,255,.68) 0 1.1px,transparent 2px),radial-gradient(circle at 82% 40%,rgba(221,238,255,.68) 0 1px,transparent 2px);opacity:.36;animation:twinkle 8s ease-in-out infinite}.shell{width:min(100%,920px);margin:0 auto;padding:64px 18px 40px;position:relative;z-index:1}.chip{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(162,201,255,.14);color:var(--accent);font-size:.78rem;letter-spacing:.08em;text-transform:uppercase}h1{margin:18px 0 12px;font-size:clamp(2.6rem,5vw,4.6rem);line-height:.98;letter-spacing:-.06em;font-weight:650}.hero-copy{margin:0;max-width:38rem;color:var(--muted);line-height:1.8}.audio-fallback{display:none;margin-top:16px}.audio-fallback.show{display:flex}.card{position:relative;overflow:hidden;border-radius:34px;padding:24px;background:linear-gradient(180deg,rgba(16,40,74,.78),rgba(9,24,47,.72));border:1px solid var(--line);box-shadow:0 32px 60px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.05)}.card::before{content:"";position:absolute;inset:-18% auto auto 58%;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,var(--glow),transparent 70%)}.list{display:grid;gap:16px;position:relative;z-index:1}.item{opacity:0;transform:translateY(22px) scale(.988);border-radius:24px;padding:18px 18px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(156,197,255,.1);filter:blur(6px);position:relative;overflow:hidden;animation:reveal 2.8s cubic-bezier(.18,.84,.22,1) forwards}.item:nth-child(1){animation-delay:.6s}.item:nth-child(2){animation-delay:7.6s}.item:nth-child(3){animation-delay:14.6s}.item:nth-child(4){animation-delay:21.6s}.item:nth-child(5){animation-delay:28.6s}.item::after{content:"";position:absolute;inset:-18%;background:radial-gradient(circle,rgba(155,204,255,.18),transparent 56%);opacity:0;transform:scale(.92);animation:pulse 2.6s ease-out forwards}.item:nth-child(1)::after{animation-delay:.8s}.item:nth-child(2)::after{animation-delay:7.8s}.item:nth-child(3)::after{animation-delay:14.8s}.item:nth-child(4)::after{animation-delay:21.8s}.item:nth-child(5)::after{animation-delay:28.8s}.label{display:block;margin-bottom:8px;color:rgba(184,212,247,.76);font-size:.8rem;letter-spacing:.08em;text-transform:uppercase}.value{margin:0;font-size:clamp(1.06rem,2.3vw,1.45rem);line-height:1.6}.closing{min-height:150px;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}.closing .value{max-width:32rem}.actions,.audio-fallback{display:flex;gap:12px;flex-wrap:wrap}.actions{margin-top:22px}.button{display:inline-flex;align-items:center;justify-content:center;min-width:160px;padding:12px 18px;border-radius:999px;color:#0b284d;text-decoration:none;font-size:.94rem;font-weight:560;background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(205,228,255,.94));border:1px solid rgba(255,255,255,.18);box-shadow:0 16px 28px rgba(0,0,0,.18)}.audio-link{min-width:220px}.audio{position:absolute;width:1px;height:1px;opacity:.01;pointer-events:none}@keyframes reveal{from{opacity:0;transform:translateY(22px) scale(.988);filter:blur(6px)}to{opacity:1;transform:translateY(0);filter:blur(0)}}@keyframes pulse{0%{opacity:0;transform:scale(.92)}24%{opacity:.9;transform:scale(1)}100%{opacity:0;transform:scale(1.08)}}@keyframes breathe{0%,100%{background:radial-gradient(circle at top left,rgba(113,170,255,.18),transparent 30%),radial-gradient(circle at 80% 16%,rgba(122,153,255,.16),transparent 24%),radial-gradient(circle at center bottom,rgba(129,189,255,.14),transparent 34%),linear-gradient(180deg,var(--bg1),var(--bg2) 48%,var(--bg3))}50%{background:radial-gradient(circle at top left,rgba(140,194,255,.24),transparent 34%),radial-gradient(circle at 78% 14%,rgba(149,173,255,.2),transparent 28%),radial-gradient(circle at center bottom,rgba(145,205,255,.18),transparent 38%),linear-gradient(180deg,#081d3a,#0d2a52 48%,#17427a)}}@keyframes drift{from{transform:translateY(0)}to{transform:translateY(14px)}}@keyframes twinkle{0%,100%{opacity:.3}50%{opacity:.52}}@media (max-width:760px){.shell{padding-top:36px}.card{border-radius:28px;padding:18px}h1{font-size:2.6rem}}
</style>
</head>
<body>
<div class="stars" aria-hidden="true"></div>
<main class="shell">
<section><div class="chip">Dream</div><h1>Dream</h1><p class="hero-copy">有些时刻不只是完成了一件事，而是证明了你真的在慢慢靠近自己的梦想。</p><div class="audio-fallback" id="audioFallback"><button class="button audio-link" id="audioResumeBtn" type="button">点击继续播放 Dream 音乐</button></div></section>
<section class="card"><div class="list"><article class="item"><span class="label">You Completed</span><p class="value" id="wishText">正在读取你完成的愿望...</p></article><article class="item"><span class="label">Wish Began</span><p class="value" id="wishTime">正在读取许愿时间...</p></article><article class="item"><span class="label">Tasks Completed</span><p class="value" id="tasksCount">正在统计任务完成次数...</p></article><article class="item"><span class="label">Website Visits</span><p class="value" id="visitCount">正在统计使用次数...</p></article><article class="item closing"><p class="value">谢谢您使用我做的网站，接下来请继续自律下去，直到真正实现你的梦想！----来自 Andrew McCain 的鼓励。</p></article></div><div class="actions"><a class="button" href="Daymori.html">回到主页</a></div></section>
</main>
<audio class="audio" id="dreamAudio" preload="auto" src="./Andrew.m4a"></audio>
<script>
const DREAM_MOMENT_KEY='focus-buddy-dream-moment',STORAGE_KEY='focus-buddy-state',DREAM_AUDIO_SRC='./Andrew.m4a';
function formatDateTime(s){const d=new Date(s);if(Number.isNaN(d.getTime()))return'某个认真开始的时刻';return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}
function readState(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}}catch{return {}}}
function readDreamMoment(){try{return JSON.parse(localStorage.getItem(DREAM_MOMENT_KEY))||{}}catch{return {}}}
function getCompletedTaskCount(savedState,dreamMoment){if(Number.isFinite(dreamMoment.completedTasks))return dreamMoment.completedTasks;if(Array.isArray(savedState.todos))return savedState.todos.filter(t=>t.done||t.completed).length;return 0}
function playDreamAudio(){const audio=document.getElementById('dreamAudio'),fallback=document.getElementById('audioFallback');audio.src=DREAM_AUDIO_SRC;audio.currentTime=0;document.body.classList.add('playing');audio.addEventListener('ended',()=>document.body.classList.remove('playing'),{once:true});audio.play().then(()=>fallback.classList.remove('show')).catch(()=>fallback.classList.add('show'))}
function renderDreamData(){const savedState=readState(),dreamMoment=readDreamMoment();document.getElementById('wishText').textContent=dreamMoment.wishText||'你刚刚完成了一个重要愿望。';document.getElementById('wishTime').textContent=formatDateTime(dreamMoment.wishedAt);document.getElementById('tasksCount').textContent=`${getCompletedTaskCount(savedState,dreamMoment)} 次`;document.getElementById('visitCount').textContent=`${dreamMoment.visitCount ?? savedState.visitCount ?? 0} 次`}
document.querySelector('.actions .button').setAttribute('href',new URL('./Daymori.html',window.location.href).toString());
document.getElementById('audioResumeBtn').addEventListener('click',playDreamAudio);
window.addEventListener('storage',e=>{if(e.key===STORAGE_KEY||e.key===DREAM_MOMENT_KEY)renderDreamData()});
renderDreamData();
setInterval(renderDreamData,2000);
playDreamAudio();
</script>
</body>
</html>
