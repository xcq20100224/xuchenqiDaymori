<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Dream · Daymori</title>
  <link rel="manifest" href="./manifest.json"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
      color:#fff;
      font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
      text-align:center;
      padding:2rem;
    }
    h1{font-size:2rem;margin-bottom:.5rem;opacity:.9;}
    p{font-size:1rem;opacity:.6;margin-bottom:2rem;}
    .btn{
      padding:.75rem 2rem;
      border:none;
      border-radius:2rem;
      background:rgba(233,69,96,.85);
      color:#fff;
      font-size:1rem;
      cursor:pointer;
      transition:transform .15s,opacity .15s;
      backdrop-filter:blur(6px);
    }
    .btn:hover{transform:scale(1.05);opacity:.9;}
    .back{
      margin-top:1.5rem;
      font-size:.875rem;
      opacity:.5;
      cursor:pointer;
      text-decoration:underline;
    }
    .back:hover{opacity:.8;}
  </style>
</head>
<body>
  <h1>✨ 梦境时光</h1>
  <p>放松心情，进入冥想模式</p>
  <button class="btn" id="playBtn">▶ 播放音乐</button>
  <div class="back" onclick="history.back()">← 返回</div>

  <script>
    const DREAM_AUDIO_SRC = './Andrew.m4a';
    const audio = new Audio(DREAM_AUDIO_SRC);
    audio.loop = true;

    const playBtn = document.getElementById('playBtn');

    function playDreamAudio() {
      audio.play().then(() => {
        playBtn.textContent = '⏸ 暂停音乐';
      }).catch(() => {
        playBtn.textContent = '▶ 播放音乐';
      });
    }

    playBtn.addEventListener('click', () => {
      if (audio.paused) {
        playDreamAudio();
      } else {
        audio.pause();
        playBtn.textContent = '▶ 播放音乐';
      }
    });

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js').catch(() => {});
    }
  </script>
</body>
</html>
